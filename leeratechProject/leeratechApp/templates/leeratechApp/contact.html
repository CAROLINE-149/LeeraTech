{% extends 'base.html'%} {% block content %}

<!-- HERO -->

<section class="hero">
  <div class="container">
    <h1 class="display-5 fw-bold">Contact LeeraTech</h1>

    <p class="lead mt-3">
      Have questions or want to request a demo? We'd love to hear from you.
    </p>
  </div>
</section>

<!-- CONTACT SECTION -->

<section class="py-5">
  <div class="container">
    <div class="row g-5">
      <!-- CONTACT INFO -->

      <div class="col-md-5">
        <div class="contact-card">
          <h4 class="mb-4">Contact Information</h4>

          <p>
            <i class="bi bi-envelope contact-icon"></i>
            info@leeratech.com
          </p>

          <p>
            <i class="bi bi-telephone contact-icon"></i>
            +254 700 123 456
          </p>

          <p>
            <i class="bi bi-geo-alt contact-icon"></i>
            Nairobi, Kenya
          </p>

          <hr />

          <h5>Follow Us</h5>

          <div class="social mt-3">
            <a href="#"><i class="bi bi-facebook"></i></a>

            <a href="#"><i class="bi bi-twitter"></i></a>

            <a href="#"><i class="bi bi-linkedin"></i></a>

            <a href="#"><i class="bi bi-instagram"></i></a>
          </div>
        </div>
      </div>

      <!-- CONTACT FORM -->

      <div class="col-md-7">
        <div class="contact-card">
          <h4 class="mb-4">Send Us a Message</h4>

          <form>
            <div class="row mb-3">
              <div class="col">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Full Name"
                />
              </div>

              <div class="col">
                <input
                  type="email"
                  class="form-control"
                  placeholder="Email Address"
                />
              </div>
            </div>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="School Name"
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Phone Number"
              />
            </div>

            <div class="mb-3">
              <textarea
                class="form-control"
                rows="5"
                placeholder="Your Message"
              ></textarea>
            </div>

            <button class="btn btn-success">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center py-4">
  <p>© 2026 LeeraTech. All Rights Reserved.</p>
</footer>

{% endblock%}
